%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:default;MODE=MYSQL;NON_KEYWORDS=user
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create

%test.auth.attemp-max=1

%test.refresh.token.ttl=3600

%test.api.captcha.token=test
%test.stripe.secret-key=test

%test.quarkus.kafka.devservices.enabled=false

%test.mp.jwt.verify.issuer=test-issuer
%test.mp.jwt.duration=3600
%test.mp.jwt.verify.publickey.location=jwt-key/publicKey.pem
%test.quarkus.native.resources.includes=jwt-key/publicKey.pem
%test.smallrye.jwt.sign.key.location=jwt-key/privateKey.pem

%test.upload.directory=${java.io.tmpdir}/tmp

%test.website.name=Test
%test.website.url=http://localhost:3000
%test.website.url.activation=/auth/activation/
%test.website.url.payment.ok=/
%test.website.url.payment.ko=/
